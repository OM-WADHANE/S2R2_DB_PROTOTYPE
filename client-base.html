        <main class="flex-1 p-6">
            <div class="mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Client Base</h2>
                <p class="text-gray-600">Manage your clients and export/import them with Excel</p>
            </div>

            <div class="bg-white rounded-xl shadow-md p-6 mb-8">
                <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
                    <div class="flex items-center gap-3">
                        <button id="addClientBtn" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition flex items-center gap-2">
                            <i class="fas fa-user-plus"></i>
                            <span>Add Client</span>
                        </button>
                        <button id="exportClientsBtn" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-green-700 transition flex items-center gap-2">
                            <i class="fas fa-file-excel"></i>
                            <span>Export Excel</span>
                        </button>
                        <label class="inline-flex items-center gap-2 cursor-pointer text-sm text-gray-600">
                            <i class="fas fa-file-import text-blue-500"></i>
                            <span>Import Excel</span>
                            <input id="importClientsInput" type="file" accept=".xlsx,.xls" class="hidden">
                        </label>
                    </div>
                    <div class="w-full md:w-64">
                        <div class="relative">
                            <input id="clientSearch" type="text" placeholder="Search clients..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        </div>
                    </div>
                </div>

                <div class="overflow-x-auto rounded-lg border border-gray-200">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">No.</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Client Name</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Area</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Contact</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Phone</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTableBody" class="bg-white divide-y divide-gray-200">
                            <!-- Filled by JavaScript -->
                        </tbody>
                    </table>
                </div>
                <p id="clientsEmptyState" class="text-center text-gray-500 text-sm mt-4 hidden">
                    No clients yet. Use "Add Client" or import from Excel.
                </p>
            </div>

            <div id="addClientModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
                <div class="bg-white rounded-xl p-6 w-full max-w-md">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-bold">Add Client</h3>
                        <button id="closeClientModal" class="text-gray-500 hover:text-gray-700">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <form id="addClientForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Client Name</label>
                            <input id="clientNameInput" type="text" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Area</label>
                            <input id="clientAreaInput" type="text" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Contact Person</label>
                            <input id="clientContactInput" type="text" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input id="clientEmailInput" type="email" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                            <input id="clientPhoneInput" type="text" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="pt-2">
                            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
                                Save Client
                            </button>
                        </div>
                    </form>
                </div>

          {"name": "Cummins India", "area": "Phaltan", "contact_person": "Pradeep Manal", "email": "pradeep.manal@cummins.com", "phone": ""},
          {"name": "", "area": "", "contact_person": "Manoj Mohanty", "email": "manoj.mohanty@cummins.com", "phone": ""},
          {"name": "", "area": "", "contact_person": "Krishna K", "email": "krishna.k.m@cummins.com", "phone": ""},
          {"name": "", "area": "", "contact_person": "Banerjee Biswa", "email": "biswarup.banerjee@cummins.com", "phone": ""},
          {"name": "Monk Automation", "area": "Pune", "contact_person": "", "email": "marketing@monkautomation.com", "phone": ""},
          {"name": "Kasturi / Shreeram Foundry", "area": "Kolhapur", "contact_person": "Rahul Mali", "email": "Rahul@zanvargroup.com", "phone": ""}
        ];

        const clientsTableBody = document.getElementById('clientsTableBody');
        const clientsEmptyState = document.getElementById('clientsEmptyState');
        const clientSearchInput = document.getElementById('clientSearch');
        const exportClientsBtn = document.getElementById('exportClientsBtn');
        const importClientsInput = document.getElementById('importClientsInput');
        const addClientBtn = document.getElementById('addClientBtn');
        const addClientModal = document.getElementById('addClientModal');
        const closeClientModal = document.getElementById('closeClientModal');
        const addClientForm = document.getElementById('addClientForm');

        let allClients = window.CLIENTS.slice();

        function showToast(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `fixed top-4 right-4 px-4 py-2 rounded-lg shadow-lg text-sm z-50 ${
                type === 'success'
                    ? 'bg-green-500 text-white'
                    : type === 'error'
                    ? 'bg-red-500 text-white'
                    : 'bg-blue-500 text-white'
            }`;
            div.textContent = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function loadClients() {
            // Just use in-memory data; no server / DB
            allClients = window.CLIENTS.slice();
            renderClients(allClients);
        }

        function renderClients(list) {
            clientsTableBody.innerHTML = '';
            if (!list || list.length === 0) {
                clientsEmptyState.classList.remove('hidden');
                return;
            }
            clientsEmptyState.classList.add('hidden');

            list.forEach((c, idx) => {
                const tr = document.createElement('tr');
                tr.className = idx % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                tr.innerHTML = `
                    <td class="px-4 py-3 text-sm text-gray-600 font-medium">${idx + 1}</td>
                    <td class="px-4 py-3 text-sm text-gray-900">${c.name || ''}</td>
                    <td class="px-4 py-3 text-sm text-gray-700">${c.area || ''}</td>
                    <td class="px-4 py-3 text-sm text-gray-700">${c.contact_person || ''}</td>
                    <td class="px-4 py-3 text-sm text-blue-600">${c.email || ''}</td>
                    <td class="px-4 py-3 text-sm text-gray-700">${c.phone || ''}</td>
                `;
                clientsTableBody.appendChild(tr);
            });
        }

        clientSearchInput.addEventListener('input', () => {
            const q = clientSearchInput.value.toLowerCase();
            const filtered = allClients.filter((c) => {
                return (
                    (c.name || '').toLowerCase().includes(q) ||
                    (c.area || '').toLowerCase().includes(q) ||
                    (c.contact_person || '').toLowerCase().includes(q) ||
                    (c.email || '').toLowerCase().includes(q) ||
                    (c.phone || '').toLowerCase().includes(q)
                );
            });
            renderClients(filtered);
        });

        // Add client modal
        addClientBtn.addEventListener('click', () => {
            addClientModal.classList.remove('hidden');
        });
        closeClientModal.addEventListener('click', () => {
            addClientModal.classList.add('hidden');
        });
        window.addEventListener('click', (event) => {
            if (event.target.id === 'addClientModal') {
                addClientModal.classList.add('hidden');
            }
        });

        addClientForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('clientNameInput').value;
            const area = document.getElementById('clientAreaInput').value;
            const contact_person = document.getElementById('clientContactInput').value;
            const email = document.getElementById('clientEmailInput').value;
            const phone = document.getElementById('clientPhoneInput').value;

            const newClient = { name, area, contact_person, email, phone };
            window.CLIENTS.push(newClient);
            allClients = window.CLIENTS.slice();
            renderClients(allClients);
            addClientForm.reset();
            addClientModal.classList.add('hidden');
            showToast('Client added', 'success');
        });

        // Export clients to Excel
        exportClientsBtn.addEventListener('click', () => {
            if (!allClients || allClients.length === 0) {
                showToast('No clients to export', 'info');
                return;
            }
            const data = allClients.map((c, idx) => ({
                'No.': idx + 1,
                'Client Name': c.name || '',
                'Area': c.area || '',
                'Contact Person': c.contact_person || '',
                'Email': c.email || '',
                'Phone': c.phone || ''
            }));
            const worksheet = XLSX.utils.json_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, 'Clients');
            XLSX.writeFile(workbook, 'Clients.xlsx');
        });

        // Helper function to find field value from row using multiple possible column names
        function findField(row, possibleNames) {
            if (!row) return '';
            for (const name of possibleNames) {
                // Try exact match first
                if (row[name] !== undefined && row[name] !== null && String(row[name]).trim() !== '') {
                    return String(row[name]).trim();
                }
                // Try case-insensitive match
                for (const key in row) {
                    if (key.toLowerCase() === name.toLowerCase() && String(row[key]).trim() !== '') {
                        return String(row[key]).trim();
                    }
                }
            }
            return '';
        }

        // Import clients from Excel (purely in browser, no server)
        importClientsInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[sheetName];
                    const json = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

                    // Debug: Log all available column names
                    if (json.length > 0) {
                        console.log('Available columns in Excel:', Object.keys(json[0]));
                    }

                    const clients = json.map((row) => {
                        const name = findField(row, [
                            // Column letter from your sheet
                            'B',
                            // Common header variants
                            'Main Client Name', 'Client Name', 'Customer Name', 'Name', 'Client', 'Company Name', 
                            'Company', 'Customer', 'Client/Customer', 'name', 'client name', 'main client name'
                        ]);
                        const area = findField(row, [
                            'Area', 'Region', 'Zone', 'Territory', 'Location', 'area', 'region'
                        ]);
                        const contact_person = findField(row, [
                            'Contact Person', 'Contact', 'Contact Name', 'Person', 'Contact Person Name',
                            'Primary Contact', 'Main Contact', 'contact_person', 'contact person', 'contact'
                        ]);
                        const email = findField(row, [
                            // Column letter from your sheet
                            'F',
                            // Common header variants
                            'Email', 'E-mail', 'Mail', 'Email Address', 'E-Mail', 'email', 'e-mail'
                        ]);
                        const phone = findField(row, [
                            // Column letter from your sheet
                            'E',
                            // Common header variants
                            'Phone', 'Mobile', 'Mobile Number', 'Contact Number', 'Phone Number', 'Phone number',
                            'Tel', 'Telephone', 'Cell', 'Cell Phone', 'phone', 'mobile', 'contact number'
                        ]);

                        return {
                            name: name,
                            area: area,
                            contact_person: contact_person,
                            email: email,
                            phone: phone
                        };
                    }).filter(c => c.name || c.area || c.contact_person || c.email || c.phone); // Filter out completely empty rows

                    console.log('Parsed clients:', clients.slice(0, 3)); // Log first 3 for debugging

                    // Merge imported clients into in-memory list
                    window.CLIENTS = window.CLIENTS.concat(clients);
                    allClients = window.CLIENTS.slice();
                    renderClients(allClients);
                    showToast(`Imported ${clients.length} clients`, 'success');
                } catch (err) {
                    console.error(err);
                    showToast(err.message || 'Failed to import clients', 'error');
                } finally {
                    importClientsInput.value = '';
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // Initial load
        loadClients();

        // ============ LOGIN PROTECTION ============
        // Check if user is logged in
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        // Display logged-in username
        const username = localStorage.getItem('username') || 'User';
        const userElements = document.querySelectorAll('header .flex.items-center.space-x-2 span');
        userElements.forEach(span => {
            if (span.textContent.includes('Admin')) {
                span.textContent = username.charAt(0).toUpperCase() + username.slice(1);
            }
        });

        // Add logout functionality
        const userProfile = document.querySelector('header img[alt="User profile picture"]');
        if (userProfile) {
            userProfile.style.cursor = 'pointer';
            userProfile.parentElement.style.cursor = 'pointer';
            userProfile.parentElement.addEventListener('click', function() {
                if (confirm('Do you want to logout?')) {
                    localStorage.removeItem('isLoggedIn');
                    localStorage.removeItem('username');
                    localStorage.removeItem('loginTime');
                    window.location.href = 'login.html';
                }
            });
        }
    </script>
</body>
</html>
